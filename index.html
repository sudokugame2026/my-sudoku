<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>瑞士极简数独</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f2ed;--fg:#2d3748;--gold:#c8a96e;--muted:#9ca3af;--brd:#d4cfc4;--cell:#fff;--fixed:#f0ece4;--sel:#e8e0d0;--hl:#ede8de;--same:#e0d8c8;--err:#fde8e8}
body{font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px}
h1{font-size:1rem;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.wrap{width:min(92vw,380px);aspect-ratio:1;padding:5px;background:#fff;border-radius:5px;box-shadow:0 2px 14px rgba(0,0,0,.07)}
.board{width:100%;height:100%;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);border:1.5px solid var(--fg);border-radius:2px;overflow:hidden}
.cell{display:flex;align-items:center;justify-content:center;font-size:min(5.5vw,18px);font-weight:300;background:var(--cell);border-right:1px solid var(--brd);border-bottom:1px solid var(--brd);cursor:pointer;position:relative;transition:background .12s ease;user-select:none;-webkit-user-select:none}
.cell:nth-child(3n){border-right:1.5px solid var(--fg)}
.cell:nth-child(n+73){border-bottom:1.5px solid var(--fg)}
.cell:nth-child(9n){border-right:none}
.cell.fixed{background:var(--fixed);font-weight:500}
.cell.sel{background:var(--sel)}
.cell.hl,.cell:hover:not(.fixed):not(.sel){background:var(--hl)}
.cell.same{background:var(--same)}
.cell.err{background:var(--err)}
.ctrl{margin-top:14px;width:min(92vw,380px);display:flex;flex-direction:column;gap:8px}
.rw{display:flex;gap:6px;align-items:center;justify-content:space-between}
.nums{display:flex;gap:3px;flex:1}
.nbtn{flex:1;aspect-ratio:1;max-width:34px;border:1px solid var(--brd);border-radius:4px;background:#fff;color:var(--fg);font-size:min(3.8vw,13px);cursor:pointer;transition:all .12s ease}
.nbtn:hover{background:var(--hl);border-color:var(--gold)}
.nbtn.notes{background:var(--sel);border-color:var(--gold)}
.abtn{padding:7px 10px;border:none;border-radius:4px;font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .12s ease}
.abtn.pri{background:var(--fg);color:#fff}
.abtn.pri:hover{background:#1a202c}
.abtn.sec{background:#fff;border:1px solid var(--brd);color:var(--fg)}
.abtn.sec:hover{background:var(--hl)}
.abtn.dn{border:1px solid #c44;color:#c44}
.abtn.dn:hover{background:#fde8e8}
.selEl{padding:6px 8px;border:1px solid var(--brd);border-radius:4px;background:#fff;font-size:11px;color:var(--fg);cursor:pointer}
.hbtn{padding:7px 10px;border:1px solid var(--gold);border-radius:4px;background:#fff;color:var(--gold);font-size:10px;cursor:pointer;transition:all .12s ease}
.hbtn:hover{background:var(--sel)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.tm{font-variant-numeric:tabular-nums;font-size:11px;color:var(--muted);letter-spacing:.1em}
.win{position:fixed;inset:0;background:rgba(245,242,237,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100;animation:.35s ease}
.win h2{font-size:1.1rem;font-weight:300;letter-spacing:.25em;text-transform:uppercase;color:var(--gold)}
.win p{font-size:.75rem;color:var(--muted)}
.win .t{font-size:.95rem;color:var(--fg);letter-spacing:.15em}
.msg{text-align:center;font-size:11px;color:var(--gold);min-height:14px}
@media(max-width:360px){h1{font-size:.88rem}.cell{font-size:7vw}.nbtn{max-width:30px;font-size:4.5vw}}
</style>
</head>
<body>
<h1>瑞士极简数独</h1>
<div class="wrap"><div class="board" id="board"></div></div>
<div class="ctrl">
  <div class="rw">
    <select class="selEl" id="diff">
      <option value="easy">简单</option>
      <option value="medium" selected>中等</option>
      <option value="hard">困难</option>
    </select>
    <span class="tm" id="timer">00:00</span>
    <button class="hbtn" id="hintBtn">提示 (3)</button>
  </div>
  <div class="rw">
    <div class="nums" id="numBtns"></div>
    <button class="abtn dn" id="eraseBtn">橡皮</button>
    <button class="abtn sec" id="notesBtn">笔记</button>
    <button class="abtn pri" id="newBtn">新游戏</button>
  </div>
</div>
<div class="win" id="win" style="display:none">
  <h2>恭喜通关</h2>
  <p>用时</p>
  <p class="t" id="winTime">00:00</p>
  <button class="abtn pri" id="winNewBtn">新游戏</button>
</div>
<script>
// ── State ───────────────────────────────────────────────────
var board=[], initB=[], sel=null, notes=false, hints=3, won=false, gameKey=0;
var timer=0, timerIV=null;

// ── Sudoku Generator ────────────────────────────────────────
function generate(difficulty){
  var g=Array.from({length:9},function(){return Array.from({length:9},function(){return 0})});
  // Fill diagonal boxes first
  for(var box=0;box<9;box+=3){
    var used={};var bi=box,bj=box;
    for(var i=0;i<3;i++)for(var j=0;j<3;j++){
      var n,r=0;
      do{r++;if(r>9){n=0;break}else if(!used[r]){n=r;used[r]=true}}while(n===0);
      if(n===0){for(var k=0;k<j;k++)used[g[bi+i][bj+k]]=false;g[bi+i][bj+j]=0;i=j=-1;break}
      g[bi+i][bj+j]=n;
    }}
  // Fill rest with backtracking
  if(!solve(g))return generate(difficulty);
  // Remove cells based on difficulty
  var blanks=difficulty==='easy'?35:difficulty==='medium'?42:48;
  var cells=Array.from({length:81},function(v,i){return i});
  for(var i=cells.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cells[i];cells[i]=cells[j];cells[j]=t}
  for(var i=0;i<blanks;i++){g[Math.floor(cells[i]/9)][cells[i]%9]=0}
  return g;
}

function solve(b){
  for(var r=0;r<9;r++)for(var c=0;c<9;c++)if(b[r][c]===0){
    var avail=[];
    for(var n=1;n<=9;n++)if(valid(b,r,c,n))avail.push(n);
    if(avail.length===0)return false;
    // Shuffle
    for(var i=avail.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=avail[i];avail[i]=avail[j];avail[j]=t}
    for(var i=0;i<avail.length;i++){
      b[r][c]=avail[i];
      if(solve(b))return true;
      b[r][c]=0;
    }
    return false;
  }
  return true;
}

function valid(b,r,c,n){
  for(var i=0;i<9;i++)if(i!==c&&b[r][i]===n)return false;
  for(var i=0;i<9;i++)if(i!==r&&b[i][c]===n)return false;
  var bi=Math.floor(r/3)*3,bj=Math.floor(c/3)*3;
  for(var i=bi;i<bi+3;i++)for(var j=bj;j<bj+3;j++)if((i!==r||j!==c)&&b[i][j]===n)return false;
  return true;
}

function solveGivens(b){
  var t=b.map(function(r){return r.slice()});
  solve(t);return t;
}

function isInit(r,c){return initB[r][c]!==0}
function getCell(r,c){return board[r][c]}
function getErr(){return document.getElementById('err'+r+c)}

// ── Render ──────────────────────────────────────────────────
function render(){
  var boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  for(var r=0;r<9;r++){
    for(var c=0;c<9;c++){
      var cell=document.createElement('div');
      cell.className='cell'+getCls(r,c);
      cell.dataset.r=r;cell.dataset.c=c;
      var v=getCell(r,c);
      if(typeof v==='object'&&v.nts){
        // notes mode
        var grid=document.createElement('div');
        grid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:100%;height:100%;padding:1px';
        for(var n=1;n<=9;n++){
          var sp=document.createElement('span');
          sp.style.cssText='text-align:center;line-height:1;font-size:min(2vw,8px);color:'+(v.nts.indexOf(n)>=0?'#888':'transparent');
          sp.textContent=n;
          grid.appendChild(sp);
        }
        cell.appendChild(grid);
      } else if(v>0){
        cell.textContent=v;
        if(document.getElementById('err'+r+c))cell.classList.add('err');
      }
      cell.addEventListener('click',function(e){
        e.stopPropagation();
        sel=[parseInt(this.dataset.r),parseInt(this.dataset.c)];
        render();
      });
      boardEl.appendChild(cell);
    }
  }
}

function getCls(r,c){
  var cls='';
  if(isInit(r,c))cls+=' fixed';
  if(sel&&sel[0]===r&&sel[1]===c)cls+=' sel';
  else if(sel){
    if(sel[0]===r||sel[1]===c)cls+=' hl';
    else{
      var sbr=Math.floor(sel[0]/3),sbc=Math.floor(sel[1]/3);
      var rbr=Math.floor(r/3),rbc=Math.floor(c/3);
      if(sbr===rbr&&sbc===rbc)cls+=' hl';
    }
    var sv=getCell(r,c);
    if(sel&&sv>0&&sv===getCell(sel[0],sel[1])&&!notes)cls+=' same';
  }
  return cls;
}

// ── Actions ─────────────────────────────────────────────────
function placeNum(n){
  if(!sel)return;
  var r=sel[0],c=sel[1];
  if(isInit(r,c))return;
  if(notes){
    var cur=typeof board[r][c]==='object'&&board[r][c].nts?board[r][c].nts:[];
    var idx=cur.indexOf(n);
    if(idx>=0)cur.splice(idx,1);else cur.push(n);
    board[r][c]=cur.length>0?{nts:cur}:0;
  } else {
    if(n===0){
      board[r][c]=0;
      clearErr(r,c);
    } else {
      if(!valid(board,r,c,n)){
        setErr(r,c);return;
      }
      board[r][c]=n;
      clearErr(r,c);
      checkWin();
    }
  }
  render();
}

function setErr(r,c){
  var idx=r*9+c;
  var existing=window._errs=window._errs||{};
  existing[idx]=true;
  render();
}
function clearErr(r,c){
  var existing=window._errs=window._errs||{};
  delete existing[idx=r*9+c];
}
function isErr(r,c){
  var existing=window._errs=window._errs||{};
  return!!existing[r*9+c];
}

function erase(){
  if(!sel)return;
  var r=sel[0],c=sel[1];
  if(isInit(r,c))return;
  board[r][c]=0;clearErr(r,c);render();
}

function checkWin(){
  for(var r=0;r<9;r++)for(var c=0;c<9;c++)if(board[r][c]===0||isErr(r,c))return;
  won=true;clearInterval(timerIV);
  document.getElementById('winTime').textContent=document.getElementById('timer').textContent;
  document.getElementById('win').style.display='flex';
}

function giveHint(){
  if(hints<=0)return;
  var emp=[];
  for(var r=0;r<9;r++)for(var c=0;c<9;c++)if(!isInit(r,c)&&(typeof board[r][c]==='number'?board[r][c]:0)===0)emp.push([r,c]);
  if(emp.length===0)return;
  var pick=emp[Math.floor(Math.random()*emp.length)];
  var sol=solveGivens(initB);
  board[pick[0]][pick[1]]=sol[pick[0]][pick[1]];
  hints--;
  document.getElementById('hintBtn').textContent='提示 ('+hints+')';
  if(hints<=0)document.getElementById('hintBtn').disabled=true;
  sel=pick;
  render();
  checkWin();
}

function startNew(){
  var diff=document.getElementById('diff').value;
  board=generate(diff);
  initB=board.map(function(r){return r.slice()});
  sel=null;notes=false;hints=3;won=false;timer=0;
  window._errs={};
  clearInterval(timerIV);
  timerIV=setInterval(function(){timer++;document.getElementById('timer').textContent=fmt(timer)},1000);
  document.getElementById('hintBtn').textContent='提示 (3)';
  document.getElementById('hintBtn').disabled=false;
  document.getElementById('win').style.display='none';
  document.getElementById('notesBtn').classList.remove('notes');
  render();
}

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

// ── Init num buttons ────────────────────────────────────────
function initBtns(){
  var nb=document.getElementById('numBtns');
  nb.innerHTML='';
  for(var n=1;n<=9;n++){
    var btn=document.createElement('button');
    btn.className='nbtn';
    btn.textContent=n;
    btn.addEventListener('click',function(){placeNum(parseInt(this.textContent))});
    nb.appendChild(btn);
  }
}

// ── Event listeners ────────────────────────────────────────
document.getElementById('board').addEventListener('click',function(){sel=null;render()});
document.getElementById('eraseBtn').addEventListener('click',erase);
document.getElementById('notesBtn').addEventListener('click',function(){
  notes=!notes;
  this.classList.toggle('notes',notes);
});
document.getElementById('newBtn').addEventListener('click',startNew);
document.getElementById('winNewBtn').addEventListener('click',startNew);
document.getElementById('hintBtn').addEventListener('click',giveHint);
document.getElementById('diff').addEventListener('change',startNew);

// Keyboard support
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){sel=null;render();return}
  if(e.key==='Backspace'||e.key==='Delete'){erase();return}
  var n=parseInt(e.key);
  if(n>=1&&n<=9)placeNum(n);
});

// ── Start ──────────────────────────────────────────────────
initBtns();
startNew();
</script>
</body>
</html>
